<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexo Automação</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="brand-lockup">
          <img src="nexo-logo.svg" alt="Nexo PDV" class="brand-logo" />
          <div class="brand-copy">
            <p class="eyebrow">Nexo PDV</p>
            <h1>Automaçao de imagem</h1>
          </div>
        </div>
        <div class="brand-badge">Chrome</div>
      </header>

      <section class="status-card">
        <div class="status-line">
          <span class="dot"></span>
          <span id="status-text">Pronto para iniciar</span>
        </div>
        <div class="progress-wrap"><div id="progress-bar"></div></div>
        <div class="meta-row">
          <span>Última ação</span>
          <strong id="last-action">Nenhuma</strong>
        </div>
      </section>

      <section class="card controls">
        <div>
          <label class="field-label" for="limit">Limite</label>
          <input id="limit" type="number" min="1" max="5000" value="50" />
        </div>
        <div>
          <label class="field-label" for="pause-after">Intervalo</label>
          <input id="pause-after" type="number" min="0" max="5000" value="350" />
        </div>
        <label class="toggle compact-toggle">
          <input id="only-active" type="checkbox" checked />
          <span>Somente ativos</span>
        </label>
      </section>

      <section class="actions">
        <button id="start" class="primary">Executar</button>
        <button id="pause">Pausar</button>
        <button id="stop">Parar</button>
      </section>

      <section class="card">
        <div class="field-label">Eventos recentes</div>
        <div id="log" class="log-list"></div>
      </section>

      <section class="card">
        <div class="card-head">
          <div class="field-label">Depuração</div>
          <label class="toggle inline-toggle">
          <input id="debug-mode" type="checkbox" checked />
          <span>Registrar detalhes da busca</span>
          </label>
        </div>
        <div class="debug-box">
          <div><span class="debug-label">Fonte</span><strong id="debug-source">-</strong></div>
          <div><span class="debug-label">Imagem</span><strong id="debug-url">-</strong></div>
          <div><span class="debug-label">Confirmado</span><strong id="debug-confirmed">-</strong></div>
        </div>
        <pre id="debug-json" class="debug-json">Nenhum detalhe ainda.</pre>
      </section>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
